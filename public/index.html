<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RouteGuessr</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="app">
      <div class="map-shell">
        <div id="map"></div>

        <div class="top-overlay">
          <div class="route-row">
            <div class="route-info">
              <h1 id="routeTitle">Paris → Berlin</h1>
            </div>

            <div class="mode-badge" title="Driving">
              <span class="mode-label">Mode</span>
              <span class="mode-icon" id="modeBadge">🚗</span>
            </div>
          </div>

          <div class="slider-block">
            <span class="small-label">Guess travel time</span>

            <div class="slider-row">
              <input
                id="guessSlider"
                type="range"
                min="0"
                max="30"
                step="0.1"
                value="0"
              />
              <div class="slider-value" id="sliderValue">8 h</div>
            </div>
          </div>
        </div>

        <div class="bottom-overlay">
          <button id="submitGuess">Guess</button>
        </div>
      </div>
    </div>

    <div class="modal hidden" id="resultModal">
      <div class="modal-card">
        <h2>Round Result</h2>
        <p id="modalGuess"></p>
        <p id="modalReal"></p>
        <p id="modalError"></p>
        <p id="modalScore" class="score-text"></p>
        <button id="closeModal">Close</button>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
  </body>
</html>
